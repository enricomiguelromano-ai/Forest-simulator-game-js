<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Mundo 3D: Versão Mobile</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="crosshair"></div>
    
    <div id="aviso-orientacao">
        <p>Por favor, vire o celular na <b>Horizontal</b> para jogar!</p>
    </div>

    <div id="instrucoes">
        <h1>Mundo 3D Avançado</h1>
        <p>Dispositivos Móveis: Use o Joystick e os botões na tela.</p>
        <p>PC: Use W, A, S, D, SHIFT, ESPAÇO e F.</p>
        <p><b>Toque/Clique para Começar</b></p>
    </div>
    
    <button id="btn-fullscreen">Fullscreen ⛶</button>

    <div id="controles-mobile">
        <div id="zona-joystick"></div>
        
        <div id="zona-botoes">
            <button id="btn-corrida" class="btn-mobile">🏃</button>
            <button id="btn-pulo" class="btn-mobile">🦘</button>
            <button id="btn-lanterna" class="btn-mobile">🔦</button>
            <button id="btn-interagir" class="btn-mobile">🚪</button>
        </div>
    </div>
    
    <div id="prompt-interacao">Pressione E ou toque no botão 🚪 para a porta</div>

    <script src="script.js"></script>
</body>
</html>
